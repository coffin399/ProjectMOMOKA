# 掲載サイト向けサーバー数（count）投稿設定
# guild 数を定期 POST する（サイトごとに enabled + token）
count:
  # 全体スイッチ（false ならどのサイトにも送らない）
  enabled: true
  # 投稿間隔（分）
  interval_minutes: 30
  # 掲載サイト（同じ形で追加する）
  sites:
    # https://top.gg/
    topgg:
      enabled: false
      token: YOUR_TOPGG_TOKEN
      # 空文字なら投稿する Bot 自身の user.id を使う
      bot_id: ""
    # https://discordbotlist.com/
    discordbotlist:
      enabled: false
      token: YOUR_DISCORDBOTLIST_TOKEN
      bot_id: ""
      # スラッシュコマンド一覧も POST する（bot ページに表示）
      # https://docs.discordbotlist.com/commands-list
      post_commands: true
    # https://discord.bots.gg/
    discordbotsgg:
      enabled: false
      token: YOUR_DISCORDBOTSGG_TOKEN
      bot_id: ""
    # https://voidbots.net/
    voidbots:
      enabled: false
      token: YOUR_VOIDBOTS_TOKEN
      bot_id: ""
    # https://discordextremelist.xyz/
    discordextremelist:
      enabled: false
      token: YOUR_DISCORDEXTREMELIST_TOKEN
      bot_id: ""
    # https://nightly.dsc.bot/ （公開 stats API 未確認・有効化しても投稿失敗）
    dscbot:
      enabled: false
      token: YOUR_DSCBOT_TOKEN
      bot_id: ""
