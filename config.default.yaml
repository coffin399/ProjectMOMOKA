# =============================================================================
# TTS Cog Settings (読み上げ機能に関する設定)
# =============================================================================
tts:
  # --- TTS機能の有効/無効 ---------------------------------------------------
  # false にするとTTS Cog全体をロードしません（モデルも読み込まれません）。
  # VRAMが不足している環境（例: GT750 等）ではfalseに設定してください。
  enabled: true

  # --- 内製TTS（Style-Bert-VITS2互換）設定 ----------------------------------
  # モデル配置ルート（プロジェクト直下に配置）
  model_root: "models/tts-models"
  # 既定で使用するモデルディレクトリ名（未指定時は先頭の有効モデルを自動選択）
  default_model_dir: null
  # pyopenjtalk の辞書パス（任意）
  pyopenjtalk_dict_dir: null

  # サンプリング周波数とノイズ制御パラメータ
  # Discord標準: 48kHz (Discordが自動的にOpusで約64kbpsにエンコード)
  sample_rate: 48000
  noise_scale: 0.667
  noise_w: 0.8
  length_scale: 1.0

  # --- UI/既存機能用の既定パラメータ -------------------------------------
  default_model_id: 0          # 既存UIの互換用（外部API利用時に参照）
  default_style: "Neutral"
  default_style_weight: 5.0
  default_speed: 1.0
  default_volume: 1.0
  enable_say_command: true
  enable_join_leave_notice: true
  join_message_template: "{member_name}さんが参加しました。"
  leave_message_template: "{member_name}さんが退出しました。"

