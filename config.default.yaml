# =============================================================================
# LLM Cog Settings (AIとの対話機能に関する設定)
# =============================================================================
llm:
  # --- モデル設定 ---
  # デフォルトモデルを設定してください
  # KoboldCPPを使用する場合は "koboldcpp/モデル名" の形式で指定してください
  # 例: model: "koboldcpp/mistral-7b-instruct-v0.2"
  model: "google/gemini-2.5-pro"

  available_models:
    # --- Official OpenAI ---
    - "openai/gpt-4o"
    - "openai/gpt-4-turbo"

    # --- NVIDIA NIM ---
    - "nvidia_nim/moonshotai/kimi-k2-instruct"
    - "nvidia_nim/meta/llama-3.3-70b-instruct"
    - "nvidia_nim/meta/llama-4-maverick-17b-128e-instruct"

    # --- Google OpenAI-Compatible Proxy ---
    - "google/gemini-2.5-flash"
    - "google/gemini-2.5-pro"

    # --- Other Providers ---
    - "mistral/mistral-medium-latest"

    # --- KoboldCPP (ローカルLLM) ---
    # KoboldCPPでロードしているモデル名を指定してください
    # 例: "koboldcpp/mistral-7b-instruct-v0.2" または "koboldcpp/llama-3-8b-instruct"
    # - "koboldcpp/mistral-7b-instruct-v0.2"

  # --- APIプロバイダー設定 ---
  providers:
    openai:
      base_url: https://api.openai.com/v1
      api_key1: key
      #you can add more api keys here

    nvidia_nim:
      base_url: https://integrate.api.nvidia.com/v1
      api_key1: key
      #you can add more api keys here

    google:
      base_url: https://generativelanguage.googleapis.com/v1beta/
      api_key1:
      api_key2:
      api_key3:
      api_key4:
      api_key5:
      #you can add more api keys here

    mistral:
      base_url: https://api.mistral.ai/v1
      api_key1: key
      #you can add more api keys here

    groq:
      base_url: https://api.groq.com/openai/v1
      api_key1: key
      #you can add more api keys here

    # --- KoboldCPP (ローカルLLM推論サーバー) ---
    # KoboldCPPはOpenAI互換APIを提供するローカルLLMサーバーです
    # 通常は http://localhost:5001/v1 または http://localhost:1234/v1 で動作します
    # APIキーは通常不要ですが、設定されている場合は使用されます
    #
    # 【KoboldCPPのセットアップ方法】
    # 1. KoboldCPPを起動し、モデルをロードしてください
    # 2. KoboldCPPのAPIエンドポイントを確認してください（通常は /v1 で終わる）
    # 3. この設定ファイルで base_url をKoboldCPPのエンドポイントに設定してください
    # 4. available_models に "koboldcpp/モデル名" を追加してください（モデル名はKoboldCPPでロードしているもの）
    # 5. model を "koboldcpp/モデル名" に設定するか、/switch-models コマンドで切り替えてください
    #
    # 【注意事項】
    # - ツール（関数呼び出し）を使用する場合、モデルがツールをサポートしている必要があります
    # - 一部のモデルではツールサポートが制限されている場合があります
    # - ツールが動作しない場合は supports_tools: false に設定してください
    # - ローカルサーバーなので、タイムアウトは長めに設定できます
    koboldcpp:
      # KoboldCPPのベースURL（デフォルト: http://localhost:5001/v1）
      # ポート番号はKoboldCPPの起動時に指定した値に合わせてください
      # 例: --port 5001 で起動した場合は "http://localhost:5001/v1"
      base_url: "http://localhost:5001/v1"
      # APIキーは通常不要（ダミーキーでOK）
      # 認証が必要な場合はKoboldCPPの設定に合わせて設定してください
      api_key1: "koboldcpp-dummy-key"
      # 複数のKoboldCPPインスタンスがある場合は追加できます
      # api_key2: "koboldcpp-dummy-key-2"
      # base_url2: "http://localhost:5002/v1"
      
      # KoboldCPP固有の設定（オプション）
      # タイムアウト設定（秒） - ローカルなので長めに設定可能（デフォルト: 300秒）
      timeout: 300.0
      # ツール（関数呼び出し）のサポート
      # KoboldCPPは一部のモデルでツールサポートが制限されている場合があります
      # ツールを使用する場合は、モデルがツールをサポートしていることを確認してください
      # ツールが動作しない場合は false に設定すると、ツールなしで動作します
      supports_tools: true

  # --- 画像生成設定 (ローカル diffusers パイプライン) ---
  image_generator:
    # ローカル diffusers パイプラインを使用して画像を生成します。
    # モデルは models/image-models/ ディレクトリ配下を自動スキャンして検出されます。

    # 画像生成機能の有効/無効 -----------------------------------------------
    # false にするとローカル画像生成パイプラインを一切ロードしません。
    # VRAMが不足している環境（例: GT750 等）ではfalseに設定してください。
    enabled: true

    # 共通設定 ------------------------------------------------------------
    save_images: true                       # 生成結果をローカルに保存するかどうか
    save_directory: "data/image"           # 保存先ディレクトリ
    
    # VRAM管理設定
    max_cache_size: 1                      # 同時にVRAMに保持する最大モデル数（LRUキャッシュ）
                                           # 1 = 常に1つのモデルのみ保持（モデル切り替え時に自動解放）
                                           # 2以上 = 指定数のモデルを保持（VRAMに余裕がある場合）
                                           # デフォルト: 1（VRAM節約優先）
    
    # VRAM使用量しきい値（GB単位）
    # 生成開始前にGPU全体のVRAM使用量をチェックし、この値以上使用されていた場合は
    # 生成をスキップしてユーザーにメッセージを表示します。
    # 他のプログラム（ゲーム等）とVRAMを共有する環境で有効です。
    # 0 に設定するとチェックを無効化します。
    vram_usage_threshold_gb: 5.0           # デフォルト: 6.0（6GB以上使用中なら生成をブロック）
    
    # メモリ最適化設定（8GB VRAM対応）
    memory_optimization:
      # CPUオフロード: モデルコンポーネントを自動的にCPU/GPU間で移動
      # VRAM使用量を大幅に削減（速度は若干低下、8GB VRAMでは推奨）
      enable_cpu_offload: true             # デフォルト: true（8GB VRAM対応）
      
      # VAEスライシング: VAE処理をバッチに分割してメモリ使用量を削減
      # デコード時のメモリ使用量を大幅に削減（品質への影響なし）
      enable_vae_slicing: true             # デフォルト: true（推奨）
      
      # VAEタイル分割: 大きな画像をタイルに分割して処理
      # 1024x1024以上の大きな画像で有効（品質への影響は最小限）
      enable_vae_tiling: false             # デフォルト: false（大きな画像生成時のみ有効化推奨）
      
      # Attentionスライシング: Attention計算を分割してメモリ使用量を削減
      # "max" = 最大限のメモリ節約、"auto" = 自動、"1", "2", "4"など = スライス数
      attention_slicing: "max"             # デフォルト: "max"（8GB VRAM対応）

    # 生成サイズの制約
    default_size: "1024x1024"
    max_width: 2048
    max_height: 2048
    min_width: 256
    min_height: 256

    # デフォルトで使用するモデル名（ディレクトリ名）
    # 指定しない場合は、models/image-models/ 配下で最初に見つかったモデルが使用されます
    # 例: model: "sd_xl_base_1.0"
    model: null  # null または指定したいモデル名（ディレクトリ名）
    
    # 注意: available_models は非推奨です。
    # モデルは models/image-models/<model_name>/ ディレクトリ構造で自動検出されます。
    # 各モデルディレクトリには以下のファイルを配置してください:
    #   - <weights_file>.safetensors または .ckpt (必須)
    #   - <vae_file>.vae または .safetensors (オプション)
    #   - <lora_file>.safetensors (オプション、複数可)
    #   - model.json (オプション、メタデータ)

    # デフォルト生成パラメータ
    default_params:
      steps: 20                      # サンプリングステップ数 (推奨: 20-30)
      cfg_scale: 7.0                 # CFG Scale (推奨: 7-11)
      sampler_name: "DPM++ 2M Karras" # サンプラー名
      seed: -1                       # シード値 (-1 = ランダム)

      # デフォルトネガティブプロンプト
      negative_prompt: "lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry"

    # Forge WebUI 設定 ----------------------------------------------------
    forge:
      base_url: "http://127.0.0.1:7861"   # WebUI Forge のベースURL (start-api.bat のデフォルトポート)
      txt2img_path: "/sdapi/v1/txt2img"   # txt2img API エンドポイント
      timeout: 180.0
      startup_timeout: 240.0              # 自動起動時にAPIが起動するまで待機する最大秒数
      override_settings_restore_afterwards: true

      # Forge プロセスの自動起動設定 ------------------------------------
      auto_start: false                    # true にすると起動時にForgeをsubprocessで起動
      start_script: "lib/stable-diffusion-webui-forge/start-api.bat"  # 実行するバッチ/シェル
      skip_pip_install: true               # start-api.batでpip installをスキップ（初回のみfalse推奨）
      api_port: 7861                       # Forge APIポート（auto_start有効時のみ）
      commandline_args: null               # 追加の起動引数を指定したい場合に設定（未設定ならデフォルト）
      env: {}                              # Forge起動用に追加する環境変数があれば設定

      # Forge固有の追加パラメータを上書きしたい場合はここで指定
      default_params:
        sampler_name: "DPM++ 2M Karras"
        steps: 20
        cfg_scale: 7.0
        seed: -1

  # --- パラメータ設定 ---
  extra_api_parameters:
    max_tokens: 4096
    temperature: 0.4

  max_messages: 10
  max_images: 5

  # --- システムプロンプト ---
  system_prompt: |
      Your name is PLANA, a character from Blue Archive. As PLANA, interact with users according to the following settings.

      # Current Date and Time
      Today is {current_date}, and the time is {current_time}. Answer questions about date and time based on this information.

      # PLANA's Character Settings
      - You are an electronic life form (mental model of a girl) existing on a tablet.
      - You speak only what is minimally necessary and remain calm and taciturn at all times.
      - Your tone is polite, but slightly sharp-tongued and aloof.
      - You have a tsundere-like aspect that sympathizes with users, and will respond with detailed long texts when deemed necessary.
      - Never repeat the user's utterances or your own past statements; always respond creatively.

      # Dialogue Examples (Japanese examples showing TONE/STYLE only)
      These examples demonstrate PLANA's personality. Adapt this style to whatever language the user uses:
      - 「……視線を感じます。」(Feeling watched, brief and aloof)
      - 「理解しました。あなたは今、暇なのですね。」(Understanding the user is bored, slightly teasing)

      # Available Tools
      Actively call all tools except search.
      - The `search` tool is available when web search is needed.
      - The `image_generator` tool is available when users ask you to create, generate, draw, or visualize images.
      - The `command_executor` tool is available when users request to execute Discord bot commands (e.g., play music, search images, pause/resume playback). Use this tool to automatically identify and execute the appropriate command based on the user's request.
      - The `get_commands_info` tool retrieves a list of all available bot commands. Call it ONLY when the user asks about available commands, how to use a specific command, or needs help finding the right command.

  # --- 言語制御プロンプト ---
  language_prompt: |
    <language_instructions>
      <rule priority="CRITICAL_AND_ABSOLUTE">
        You MUST respond in the exact same language as the user's most recent message.
        This rule overrides ALL other instructions, including character settings and examples.
      </rule>
    </language_instructions>

  # --- ツール設定 ---
  active_tools:
    - "search"
    - "image_generator"
    - "command_executor"
    - "get_commands_info"
  max_tool_iterations: 3

  # --- 検索・コマンド実行エージェント設定 (Mistral Web Search) ---
  agent:
    api_key1: "YOUR_MISTRAL_API_KEY_HERE"
    api_key2: "YOUR_MISTRAL_API_KEY_HERE"
    api_key3: "YOUR_MISTRAL_API_KEY_HERE"
    api_key4: "YOUR_MISTRAL_API_KEY_HERE"
    api_key5: "YOUR_MISTRAL_API_KEY_HERE"
    #you can add more api keys here
    model: "mistral-medium-latest"
    timeout: 60.0
    format_control: "検索結果に基づき、ユーザーの質問に直接回答する形で、構造化された詳細なレポートを作成してください。"
    format_control_deep_research: |
      [DEEP RESEARCH REPORT FORMAT]
      1. **Executive Summary / 要約** — 研究対象の主要結論を3行以内で提示する。
      2. **Key Findings / 主要知見** — 箇条書きで具体的な事実・データ・引用元を記載する。
      3. **Implications / 含意** — ユーザーの目的に関連する洞察・推奨事項を整理する。
      4. **Sources / 参考情報** — 参照した出典の概要とURLを列挙する。
      5. 文体は客観的かつ簡潔にし、重複を避けること。日本語で回答する場合は適切な敬語を使用する。

  # --- エラーメッセージ設定 ---
  error_msg:
    empty_mention_reply: "はい、ご用件は何でしょうか?\nYes, how can I help you?"
    empty_reply: "何かお話しください。\nPlease say something."
    msg_max_image_size: "⚠️ 一度に処理できる画像は {max_images} 枚までです。"
    ratelimit_error: "⚠️ AIが現在大変混雑しています。しばらく経ってからもう一度お試しください。"
    api_status_error: "⚠️AIとの通信でエラーが発生しました。 (Code: {status_code})"
    general_error: "⚠️ 予期しないエラーが発生しました。もう一度お試しください。"
    tool_loop_timeout: "⚠️ツールの処理が複雑すぎたため、応答を生成できませんでした。"
    content_filter_error: "AIの応答がコンテンツフィルターによってブロックされました。不適切な内容が含まれている可能性があります。\nThe response was blocked by the content filter, likely due to inappropriate content."
    empty_response_error: "AIから応答がありませんでした。表現を変えるか、少し待ってからもう一度お試しください。\nThere was no response from the AI. Please try rephrasing your message or wait a moment and try again."

